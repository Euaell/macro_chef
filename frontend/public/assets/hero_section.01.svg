<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
    <defs>
        <!-- Soft Drop Shadow for overall elements -->
        <filter id="shadow-blur" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="12" result="blur"/>
            <feComponentTransfer>
                <feFuncA type="linear" slope="0.5"/>
            </feComponentTransfer>
        </filter>

        <!-- Glow effect for the dashboard ring -->
        <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur stdDeviation="6" result="blur"/>
            <feComposite in="SourceGraphic" in2="blur" operator="over"/>
        </filter>
    </defs>

    <style>
        /* Base Animation Keyframes */
        @keyframes levitate-device {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        @keyframes shadow-pulse {
            0%, 100% { transform: scale(1); opacity: 0.15; }
            50% { transform: scale(0.85); opacity: 0.08; }
        }

        @keyframes levitate-item {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-16px); }
        }

        /* Progress Ring Animation (0 to 80%) */
        @keyframes fillRing {
            to { stroke-dashoffset: 75; } /* 377 * 0.2 = ~75 */
        }

        /* Bar Chart Animation */
        @keyframes growBar {
            to { transform: scaleY(1); }
        }

        /* Class Assignments & Delays */
        .float-device {
            animation: levitate-device 6s ease-in-out infinite;
        }

        .device-shadow {
            animation: shadow-pulse 6s ease-in-out infinite;
            transform-origin: center;
        }

        /* Staggered orbiting elements */
        .float-1 { animation: levitate-item 4.5s ease-in-out infinite; animation-delay: -1s; }
        .float-2 { animation: levitate-item 5.5s ease-in-out infinite; animation-delay: -3s; }
        .float-3 { animation: levitate-item 5s ease-in-out infinite; animation-delay: -2s; }
        .float-4 { animation: levitate-item 6s ease-in-out infinite; animation-delay: -4s; }

        .progress-ring {
            stroke-dasharray: 377;
            stroke-dashoffset: 377;
            animation: fillRing 2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            animation-delay: 0.5s;
        }

        .bar {
            transform-box: fill-box;
            transform-origin: bottom;
            transform: scaleY(0);
            animation: growBar 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        /* Staggered bar chart growth */
        .bar-1 { animation-delay: 0.8s; }
        .bar-2 { animation-delay: 1.0s; }
        .bar-3 { animation-delay: 1.2s; }
        .bar-4 { animation-delay: 1.4s; }
    </style>

    <!-- Pure White Background -->
    <rect width="100%" height="100%" fill="#FFFFFF" />

    <!-- Device Floor Shadow -->
    <g transform="translate(400, 480)">
        <ellipse cx="0" cy="0" rx="150" ry="45" fill="#2C3E50" filter="url(#shadow-blur)" class="device-shadow" />
    </g>

    <!-- Main Floating Device Group -->
    <g transform="translate(400, 320)">
        <g class="float-device">
            
            <!-- Isometric Projection Group -->
            <g transform="scale(1, 0.6) rotate(-45)">
                
                <!-- Device Extrusion / Thickness Layers -->
                <rect x="-130" y="-230" width="260" height="460" rx="24" fill="#1A252F" transform="translate(-16, 16)"/>
                <rect x="-130" y="-230" width="260" height="460" rx="24" fill="#22303D" transform="translate(-8, 8)"/>
                <rect x="-130" y="-230" width="260" height="460" rx="24" fill="#2C3E50" />
                
                <!-- Device Screen -->
                <rect x="-115" y="-215" width="230" height="430" rx="16" fill="#FFFFFF" />

                <!-- SCREEN DASHBOARD UI -->
                
                <!-- Header / Profile Section -->
                <g transform="translate(-95, -180)">
                    <circle cx="15" cy="15" r="15" fill="#20C997" opacity="0.15" />
                    <circle cx="15" cy="15" r="7" fill="#20C997" />
                    <rect x="42" y="5" width="85" height="8" rx="4" fill="#2C3E50" opacity="0.8"/>
                    <rect x="42" y="20" width="55" height="6" rx="3" fill="#2C3E50" opacity="0.3"/>
                </g>

                <!-- Glowing Progress Ring Widget -->
                <g transform="translate(0, -40)">
                    <!-- Ring Background -->
                    <circle cx="0" cy="0" r="60" fill="none" stroke="#F0F4F8" stroke-width="16" />
                    
                    <!-- Animated Foreground Ring -->
                    <g transform="rotate(-90)">
                        <circle cx="0" cy="0" r="60" fill="none" stroke="#20C997" stroke-width="16" stroke-linecap="round" class="progress-ring" filter="url(#glow)"/>
                    </g>
                    
                    <!-- Inner Ring Element (Lightning Bolt) -->
                    <circle cx="0" cy="0" r="35" fill="#F8FAFC" />
                    <path d="M -4,-12 L -12,2 L -2,2 L -4,12 L 10,-2 L 2,-2 Z" fill="#FF6B6B" />
                </g>

                <!-- Mini Bar Chart -->
                <g transform="translate(-90, 85)">
                    <!-- Bar Backgrounds -->
                    <rect x="0" y="0" width="20" height="70" rx="5" fill="#F0F4F8" />
                    <rect x="35" y="0" width="20" height="70" rx="5" fill="#F0F4F8" />
                    <rect x="70" y="0" width="20" height="70" rx="5" fill="#F0F4F8" />
                    <rect x="105" y="0" width="20" height="70" rx="5" fill="#F0F4F8" />

                    <!-- Animated Bars -->
                    <rect x="0" y="25" width="20" height="45" rx="5" fill="#20C997" class="bar bar-1" />
                    <rect x="35" y="10" width="20" height="60" rx="5" fill="#FF6B6B" class="bar bar-2" />
                    <rect x="70" y="40" width="20" height="30" rx="5" fill="#2C3E50" class="bar bar-3" />
                    <rect x="105" y="15" width="20" height="55" rx="5" fill="#20C997" class="bar bar-4" />
                </g>

                <!-- Right Side UI Cards -->
                <g transform="translate(55, 85)">
                    <!-- Card 1 -->
                    <rect x="0" y="0" width="60" height="30" rx="8" fill="#F0F4F8" />
                    <circle cx="12" cy="15" r="5" fill="#FF6B6B" />
                    <rect x="25" y="11" width="25" height="3" rx="1.5" fill="#2C3E50" opacity="0.6" />
                    <rect x="25" y="17" width="15" height="2" rx="1" fill="#2C3E50" opacity="0.3" />

                    <!-- Card 2 -->
                    <rect x="0" y="40" width="60" height="30" rx="8" fill="#F0F4F8" />
                    <circle cx="12" cy="55" r="5" fill="#20C997" />
                    <rect x="25" y="51" width="25" height="3" rx="1.5" fill="#2C3E50" opacity="0.6" />
                    <rect x="25" y="57" width="20" height="2" rx="1" fill="#2C3E50" opacity="0.3" />
                </g>
                
            </g>
        </g>
    </g>

    <!-- FLOATING ORBITAL ELEMENTS -->

    <!-- Floating Avocado (Top Left) -->
    <g transform="translate(180, 180)">
        <g class="float-1">
            <g transform="rotate(20)">
                <!-- Shadow -->
                <path d="M-20,-30 C-20,-55 20,-55 20,-30 C30,-5 40,20 40,40 C40,65 -40,65 -40,40 C-40,20 -30,-5 -20,-30 Z" fill="#2C3E50" opacity="0.15" transform="translate(15, 25)" filter="url(#shadow-blur)"/>
                
                <!-- Outer Skin -->
                <path d="M-20,-30 C-20,-55 20,-55 20,-30 C30,-5 40,20 40,40 C40,65 -40,65 -40,40 C-40,20 -30,-5 -20,-30 Z" fill="#2C3E50"/>
                
                <!-- Inner Flesh -->
                <path d="M-15,-25 C-15,-45 15,-45 15,-25 C24,-2 30,18 30,35 C30,52 -30,52 -30,35 C-30,18 -24,-2 -15,-25 Z" fill="#E8F8F5"/>
                
                <!-- Coral Pit -->
                <circle cx="0" cy="18" r="16" fill="#FF6B6B"/>
                <circle cx="-5" cy="13" r="4" fill="#FFFFFF" opacity="0.6"/>
            </g>
        </g>
    </g>

    <!-- Floating Dumbbell (Top Right) -->
    <g transform="translate(630, 220)">
        <g class="float-2">
            <g transform="rotate(-35)">
                <!-- Shadow -->
                <rect x="-45" y="-12" width="90" height="24" rx="12" fill="#2C3E50" opacity="0.15" transform="translate(15, 20)" filter="url(#shadow-blur)"/>
                
                <!-- Center Handle -->
                <rect x="-35" y="-8" width="70" height="16" rx="8" fill="#2C3E50"/>
                
                <!-- Left Weights -->
                <rect x="-28" y="-25" width="14" height="50" rx="6" fill="#FF6B6B"/>
                <rect x="-40" y="-18" width="10" height="36" rx="4" fill="#2C3E50"/>
                
                <!-- Right Weights -->
                <rect x="14" y="-25" width="14" height="50" rx="6" fill="#FF6B6B"/>
                <rect x="30" y="-18" width="10" height="36" rx="4" fill="#2C3E50"/>
            </g>
        </g>
    </g>

    <!-- Floating Mint Leaf (Bottom Right) -->
    <g transform="translate(580, 480)">
        <g class="float-3">
            <g transform="rotate(15)">
                <!-- Shadow -->
                <path d="M0,40 C-45,40 -55,-10 -55,-35 C-10,-35 35,-20 45,10 C45,25 20,40 0,40 Z" fill="#2C3E50" opacity="0.15" transform="translate(10, 15)" filter="url(#shadow-blur)"/>
                
                <!-- Leaf Body -->
                <path d="M0,40 C-45,40 -55,-10 -55,-35 C-10,-35 35,-20 45,10 C45,25 20,40 0,40 Z" fill="#20C997"/>
                
                <!-- Veins -->
                <path d="M-55,-35 L0,40" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" opacity="0.4"/>
                <path d="M-25,-5 L-10,5 M-10,15 L0,25" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" opacity="0.4"/>
            </g>
        </g>
    </g>

    <!-- Abstract Geometric Accents -->
    <g class="float-4" transform="translate(250, 460)">
        <circle cx="0" cy="0" r="8" fill="none" stroke="#FF6B6B" stroke-width="4"/>
    </g>
    
    <g class="float-1" transform="translate(550, 140)">
        <path d="M-8,0 L8,0 M0,-8 L0,8" stroke="#20C997" stroke-width="4" stroke-linecap="round"/>
    </g>
    
    <g class="float-3" transform="translate(130, 360)">
        <circle cx="0" cy="0" r="5" fill="#2C3E50"/>
    </g>

</svg>