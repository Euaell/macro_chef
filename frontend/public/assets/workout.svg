<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Glow Effects -->
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-magenta" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <style>
    /* EKG Pulse Animation */
    .ekg-line {
      fill: none;
      stroke: #00f2ff;
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: url(#glow-cyan);
      stroke-dasharray: 600;
      stroke-dashoffset: 600;
      animation: pulse 3s linear infinite;
    }

    @keyframes pulse {
      to {
        stroke-dashoffset: 0;
      }
    }

    /* Dumbbell Curl Animation */
    .dumbbell-group {
      animation: curl 2s ease-in-out infinite;
      filter: url(#glow-magenta);
    }

    @keyframes curl {
      0%, 100% {
        transform: translateY(0px);
      }
      50% {
        transform: translateY(-25px);
      }
    }

    /* Styling the Dumbbell */
    .dumbbell-part {
      fill: none;
      stroke: #bc13fe;
      stroke-width: 6;
      stroke-linecap: round;
    }
  </style>

  <!-- Background EKG Line -->
  <path class="ekg-line" d="M10,100 L50,100 L60,80 L75,130 L90,60 L105,110 L115,100 L150,100 L160,85 L175,120 L190,100" />

  <!-- Animated Dumbbell -->
  <g class="dumbbell-group">
    <!-- Handle -->
    <line class="dumbbell-part" x1="70" y1="130" x2="130" y2="130" />
    <!-- Left Weight -->
    <rect class="dumbbell-part" x="55" y="115" width="15" height="30" rx="3" />
    <rect class="dumbbell-part" x="45" y="120" width="10" height="20" rx="2" />
    <!-- Right Weight -->
    <rect class="dumbbell-part" x="130" y="115" width="15" height="30" rx="3" />
    <rect class="dumbbell-part" x="145" y="120" width="10" height="20" rx="2" />
  </g>
</svg>