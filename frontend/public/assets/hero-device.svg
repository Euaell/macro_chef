<svg viewBox="0 0 920 720" xmlns="http://www.w3.org/2000/svg">
  <style>
    .float-slow { animation: floatSlow 7.2s ease-in-out infinite; transform-origin: center; }
    .float-fast { animation: floatFast 5.4s ease-in-out infinite; transform-origin: center; }
    .pulse { animation: pulse 3s ease-in-out infinite; transform-origin: center; }
    .orbit-a { animation: orbitA 14s linear infinite; transform-origin: 708px 126px; }
    .orbit-b { animation: orbitB 9s linear infinite reverse; transform-origin: 708px 126px; }
    .draw-line { stroke-dasharray: 340; stroke-dashoffset: 340; animation: drawLine 2.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .bar-a { animation: growA 1s cubic-bezier(0.16, 1, 0.3, 1) .15s both; transform-origin: center bottom; transform-box: fill-box; }
    .bar-b { animation: growA 1s cubic-bezier(0.16, 1, 0.3, 1) .28s both; transform-origin: center bottom; transform-box: fill-box; }
    .bar-c { animation: growA 1s cubic-bezier(0.16, 1, 0.3, 1) .4s both; transform-origin: center bottom; transform-box: fill-box; }
    .bar-d { animation: growA 1s cubic-bezier(0.16, 1, 0.3, 1) .52s both; transform-origin: center bottom; transform-box: fill-box; }
    .spark-a { animation: blink 2.4s ease-in-out infinite; }
    .spark-b { animation: blink 2.4s ease-in-out .6s infinite; }
    .spark-c { animation: blink 2.4s ease-in-out 1.1s infinite; }
    @keyframes floatSlow { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
    @keyframes floatFast { 0%,100% { transform: translateY(0) translateX(0); } 50% { transform: translateY(-14px) translateX(6px); } }
    @keyframes pulse { 0%,100% { opacity: .72; transform: scale(1); } 50% { opacity: 1; transform: scale(1.06); } }
    @keyframes orbitA { from { transform: rotate(0deg) translateX(18px) rotate(0deg); } to { transform: rotate(360deg) translateX(18px) rotate(-360deg); } }
    @keyframes orbitB { from { transform: rotate(0deg) translateX(28px) rotate(0deg); } to { transform: rotate(360deg) translateX(28px) rotate(-360deg); } }
    @keyframes drawLine { to { stroke-dashoffset: 0; } }
    @keyframes growA { from { transform: scaleY(.18); opacity: .35; } to { transform: scaleY(1); opacity: 1; } }
    @keyframes blink { 0%,100% { opacity: .28; } 50% { opacity: 1; } }
    @media (prefers-reduced-motion: reduce) {
      .float-slow, .float-fast, .pulse, .orbit-a, .orbit-b, .draw-line, .bar-a, .bar-b, .bar-c, .bar-d, .spark-a, .spark-b, .spark-c { animation: none !important; }
    }
  </style>
  <defs>
    <linearGradient id="bgGlow" x1="130" y1="52" x2="760" y2="632" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#14B8A6" stop-opacity=".32" />
      <stop offset=".52" stop-color="#FB923C" stop-opacity=".22" />
