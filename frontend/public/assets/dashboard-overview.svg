<svg viewBox="0 0 920 640" xmlns="http://www.w3.org/2000/svg">
  <style>
    .float-slow { animation: floatSlow 7.2s ease-in-out infinite; transform-origin: center; }
    .float-fast { animation: floatFast 5.6s ease-in-out infinite; transform-origin: center; }
    .pulse { animation: pulse 3.2s ease-in-out infinite; transform-origin: center; }
    .orbit-a { animation: orbitA 12s linear infinite; transform-origin: 734px 122px; }
    .orbit-b { animation: orbitB 8.8s linear infinite reverse; transform-origin: 734px 122px; }
    .draw-line { stroke-dasharray: 320; stroke-dashoffset: 320; animation: drawLine 2.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .bar-a { animation: growA 1s cubic-bezier(0.16, 1, 0.3, 1) .1s both; transform-origin: center bottom; transform-box: fill-box; }
    .bar-b { animation: growA 1s cubic-bezier(0.16, 1, 0.3, 1) .22s both; transform-origin: center bottom; transform-box: fill-box; }
    .bar-c { animation: growA 1s cubic-bezier(0.16, 1, 0.3, 1) .34s both; transform-origin: center bottom; transform-box: fill-box; }
    .bar-d { animation: growA 1s cubic-bezier(0.16, 1, 0.3, 1) .46s both; transform-origin: center bottom; transform-box: fill-box; }
    @keyframes floatSlow { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    @keyframes floatFast { 0%,100% { transform: translateY(0) translateX(0); } 50% { transform: translateY(-12px) translateX(6px); } }
    @keyframes pulse { 0%,100% { opacity: .74; transform: scale(1); } 50% { opacity: 1; transform: scale(1.05); } }
    @keyframes orbitA { from { transform: rotate(0deg) translateX(16px) rotate(0deg); } to { transform: rotate(360deg) translateX(16px) rotate(-360deg); } }
    @keyframes orbitB { from { transform: rotate(0deg) translateX(26px) rotate(0deg); } to { transform: rotate(360deg) translateX(26px) rotate(-360deg); } }
    @keyframes drawLine { to { stroke-dashoffset: 0; } }
    @keyframes growA { from { transform: scaleY(.18); opacity: .4; } to { transform: scaleY(1); opacity: 1; } }
    @media (prefers-reduced-motion: reduce) {
      .float-slow, .float-fast, .pulse, .orbit-a, .orbit-b, .draw-line, .bar-a, .bar-b, .bar-c, .bar-d { animation: none !important; }
    }
  </style>
  <defs>
    <linearGradient id="shellGlow" x1="110" y1="36" x2="780" y2="592" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#14B8A6" stop-opacity=".28" />
      <stop offset=".52" stop-color="#FB923C" stop-opacity=".18" />
      <stop offset="1" stop-color="#0F172A" stop-opacity=".24" />
    </linearGradient>
    <linearGradient id="deviceShell" x1="302" y1="104" x2="598" y2="534" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F8FAFC" />
      <stop offset="1" stop-color="#CBD5E1" />
    </linearGradient>
    <linearGradient id="deviceScreen" x1="330" y1="128" x2="570" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#102235" />
      <stop offset="1" stop-color="#0F172A" />
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#020617" flood-opacity=".2" />
    </filter>
  </defs>

  <rect x="60" y="32" width="800" height="576" rx="42" fill="url(#shellGlow)" opacity=".95" />
  <circle cx="168" cy="120" r="96" fill="#14B8A6" opacity=".12" class="pulse" />
  <circle cx="760" cy="494" r="118" fill="#FB923C" opacity=".12" class="pulse" />

  <g class="float-fast" filter="url(#softShadow)">
    <rect x="112" y="174" width="174" height="156" rx="26" fill="#DFFAF6" stroke="#14B8A6" stroke-opacity=".36" stroke-width="2" />
    <text x="136" y="192" fill="#0F172A" font-size="14" font-family="Arial, sans-serif" font-weight="700" letter-spacing="1.4">AI COACH</text>
    <rect x="136" y="196" width="92" height="14" rx="7" fill="#0F172A" fill-opacity=".12" />
    <rect x="142" y="214" width="114" height="15" rx="7" fill="#99F6E4" />
    <rect x="142" y="244" width="88" height="13" rx="6" fill="#BAE6FD" />
    <rect x="142" y="270" width="126" height="13" rx="6" fill="#FED7AA" />
    <circle cx="254" cy="222" r="8" fill="#14B8A6" />
    <circle cx="240" cy="250" r="8" fill="#38BDF8" />
    <circle cx="274" cy="276" r="8" fill="#FB923C" />
    <rect x="142" y="292" width="96" height="22" rx="11" fill="#0F172A" fill-opacity=".1" />
    <text x="144" y="308" fill="#0F172A" font-size="12" font-family="Arial, sans-serif" font-weight="700">Smart pacing</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="300" y="90" width="300" height="460" rx="40" fill="url(#deviceShell)" />
    <rect x="326" y="116" width="248" height="408" rx="28" fill="url(#deviceScreen)" />
    <rect x="404" y="106" width="92" height="10" rx="5" fill="#94A3B8" opacity=".48" />

    <rect x="352" y="148" width="196" height="52" rx="22" fill="#183149" stroke="#38BDF8" stroke-opacity=".26" stroke-width="2" />
    <rect x="352" y="388" width="196" height="108" rx="24" fill="#173048" stroke="#14B8A6" stroke-opacity=".28" stroke-width="2" />
    <rect x="370" y="164" width="76" height="10" rx="5" fill="#F8FAFC" fill-opacity=".16" />
    <rect x="370" y="180" width="118" height="10" rx="5" fill="#F8FAFC" fill-opacity=".24" />

    <g transform="translate(450 260)">
      <circle r="82" fill="none" stroke="#1E3A54" stroke-width="18" />
      <circle r="82" fill="none" stroke="#14B8A6" stroke-width="18" stroke-linecap="round" stroke-dasharray="340 160" transform="rotate(-90)" />
      <circle r="58" fill="#0B1A2B" stroke="#1E293B" stroke-width="2" />
    </g>

    <g transform="translate(372 410)">
      <path d="M20 70H168" stroke="#1E3A54" stroke-width="1.2" stroke-dasharray="4 8" />
      <path d="M20 46H168" stroke="#1E3A54" stroke-width="1.2" stroke-dasharray="4 8" />
      <rect x="20" y="8" width="72" height="10" rx="5" fill="#F8FAFC" fill-opacity=".18" />
      <rect x="100" y="8" width="44" height="10" rx="5" fill="#14B8A6" fill-opacity=".38" />
      <rect x="24" y="42" width="18" height="28" rx="9" fill="#14B8A6" class="bar-a" />
      <rect x="52" y="30" width="18" height="40" rx="9" fill="#38BDF8" class="bar-b" />
      <rect x="80" y="14" width="18" height="56" rx="9" fill="#FB923C" class="bar-c" />
      <rect x="108" y="24" width="18" height="46" rx="9" fill="#14B8A6" class="bar-d" opacity=".9" />
      <polyline points="22,60 50,48 78,54 106,24 134,30 162,12" fill="none" stroke="#F8FAFC" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" class="draw-line" />
    </g>
  </g>

  <g class="float-slow" filter="url(#softShadow)">
    <rect x="654" y="152" width="132" height="170" rx="28" fill="#FEF3E8" stroke="#FB923C" stroke-opacity=".34" stroke-width="2" />
    <circle cx="720" cy="198" r="28" fill="#ECFEFF" />
    <path d="M720 178l9 14 16 2-11 11 3 16-17-8-17 8 3-16-11-11 16-2z" fill="#14B8A6" />
    <text x="720" y="254" text-anchor="middle" fill="#0F172A" font-size="30" font-family="Arial, sans-serif" font-weight="700">+18</text>
    <text x="720" y="274" text-anchor="middle" fill="#475569" font-size="12" font-family="Arial, sans-serif" font-weight="700" letter-spacing="1.4">STREAK</text>
    <rect x="686" y="252" width="68" height="14" rx="7" fill="#0F172A" fill-opacity=".12" />
    <rect x="694" y="278" width="52" height="12" rx="6" fill="#0F172A" fill-opacity=".08" />
  </g>

  <g class="float-fast" filter="url(#softShadow)">
    <rect x="624" y="404" width="188" height="102" rx="28" fill="#E8F4FF" stroke="#38BDF8" stroke-opacity=".34" stroke-width="2" />
    <circle cx="660" cy="440" r="14" fill="#CCFBF1" />
    <path d="M654 446c5-9 14-13 19-10 5 3 4 12-4 18-8 6-17 4-19-8z" fill="#14B8A6" />
    <text x="690" y="438" fill="#0F172A" font-size="16" font-family="Arial, sans-serif" font-weight="700">Meal plan synced</text>
    <text x="690" y="458" fill="#475569" font-size="11" font-family="Arial, sans-serif">Macros and prep stay aligned.</text>
    <rect x="690" y="430" width="92" height="12" rx="6" fill="#0F172A" fill-opacity=".14" />
    <rect x="690" y="454" width="76" height="12" rx="6" fill="#0F172A" fill-opacity=".1" />
    <rect x="644" y="476" width="62" height="12" rx="6" fill="#38BDF8" opacity=".82" />
    <text x="644" y="498" fill="#0369A1" font-size="20" font-family="Arial, sans-serif" font-weight="700">2190 kcal</text>
  </g>

  <g class="float-slow" filter="url(#softShadow)">
    <rect x="128" y="424" width="160" height="98" rx="28" fill="#F3F0FF" stroke="#8B5CF6" stroke-opacity=".28" stroke-width="2" />
    <circle cx="166" cy="472" r="22" fill="#FFEDD5" />
    <circle cx="166" cy="472" r="13" fill="none" stroke="#FB923C" stroke-width="6" stroke-dasharray="52 16" />
    <text x="198" y="468" fill="#0F172A" font-size="18" font-family="Arial, sans-serif" font-weight="700">Balance</text>
    <text x="198" y="488" fill="#475569" font-size="11" font-family="Arial, sans-serif">Food and training</text>
    <rect x="198" y="458" width="66" height="12" rx="6" fill="#0F172A" fill-opacity=".14" />
    <rect x="198" y="482" width="82" height="12" rx="6" fill="#0F172A" fill-opacity=".1" />
  </g>

  <g transform="translate(734 122)">
    <circle r="24" fill="#F8FAFC" fill-opacity=".88" />
    <circle r="16" fill="none" stroke="#14B8A6" stroke-width="1.6" stroke-dasharray="4 7" />
    <circle r="4" fill="#14B8A6" class="orbit-a" />
    <circle r="4" fill="#FB923C" class="orbit-b" />
  </g>
</svg>
